<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Clock</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="container">
        <h1>Digital Clock</h1>
        <div id="clock">
            <span id="hours"></span>
            <span id="colon">:</span>
            <span id="minutes"></span>
            <span id="colon2">:</span>
            <span id="seconds"></span>
        </div>
        <div id="date"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
